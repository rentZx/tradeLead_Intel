name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/apps/tradelead-intel
            git config core.sshCommand "ssh -i /home/ubuntu/.ssh/tradelead_intel_key -o StrictHostKeyChecking=accept-new"
            git fetch origin main
            git reset --hard origin/main
            source .venv/bin/activate
            pip install -r requirements.txt
            python3 -c "import sqlite3; conn=sqlite3.connect('data/tradelead.sqlite3'); conn.executescript(open('schema.sql').read()); conn.close()" 2>/dev/null || true
            sudo systemctl restart tradelead-intel
            sudo systemctl restart tradelead-intel-v3
            echo "Deploy completed at $(date)"
